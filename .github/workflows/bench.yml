name: Benchmarks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bench-

      - name: Install critcmp
        run: cargo install critcmp --force || true

      - name: Restore baseline benchmarks
        uses: actions/cache/restore@v4
        with:
          path: target/criterion-baseline
          key: bench-baseline-master
          restore-keys: |
            bench-baseline-

      - name: Run benchmarks
        run: |
          cargo bench -p hyprdrive-core --bench benchmarks -- --save-baseline current
          cargo bench -p hyprdrive-dedup-engine --bench dedup_benchmarks -- --save-baseline current
          cargo bench -p hyprdrive-fs-indexer --bench scan_benchmarks -- --save-baseline current
          cargo bench -p hyprdrive-object-pipeline --bench pipeline_benchmarks -- --save-baseline current

      - name: Compare against baseline (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if [ -d target/criterion-baseline ]; then
            echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            critcmp target/criterion-baseline target/criterion/current --threshold 15 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No baseline found — skipping comparison" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save baseline (master only)
        if: github.ref == 'refs/heads/master'
        run: |
          rm -rf target/criterion-baseline
          cp -r target/criterion target/criterion-baseline

      - name: Cache baseline benchmarks (master only)
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: target/criterion-baseline
          key: bench-baseline-master
